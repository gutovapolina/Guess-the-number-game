<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Угадай число — курсовая</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-card">
    <div class="title-row">
        <img class="title-img" src="luna.png" alt="Принцесса Луна" onerror="this.style.display='none'">
        <h1> Угадай число </h1>
        <img class="title-img" src="nightmare.png" alt="Найтмер Мун" onerror="this.style.display='none'">
    </div>

    <div class="stats">
        ПОПЫТОК: <strong id="attemptsCount">0</strong>
    </div>

    <div class="game-zone">
        <input type="number" id="guessInput" placeholder="от 1 до 100">
        <button id="guessBtn">Проверить</button>
        <button id="newGameBtn">Новая игра</button>
        <button id="resetRecordsBtn">Сбросить рекорды</button>
    </div>

    <div class="message" id="message">
        Введи число и нажми «Проверить»
    </div>

    <div class="records-wrapper">
        <div class="records-box">
            <h3> Таблица лидеров </h3>
            <div id="records"></div>
        </div>
    </div>
</div>
<script src="game.js"></script>
</body>
</html>
